name: CD Pipeline — BodaConnect

on:
  workflow_run:
    workflows: ["CI Pipeline — BodaConnect"]
    types:
      - completed
    branches: [ main ]

jobs:
  # ── JOB 1: Deploy to Staging ──────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push staging image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:staging .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:staging
          echo "✅ Staging image pushed to Docker Hub"

      - name: Verify staging image is available
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:staging
          echo "✅ Staging deployment verified"

  # ── JOB 2: Production (requires manual approval via GitHub Environment) ────
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production    # ← GitHub will PAUSE here and ask for approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:v1
          echo "✅ Production image pushed — tagged as :latest and :v1"

      - name: Production deployment complete
        run: |
          echo "🚀 BodaConnect is live in production!"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/bodaconnect:latest"
          docker images